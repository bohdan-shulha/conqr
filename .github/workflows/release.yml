name: Release

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: 'Version bump type or specific version'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      custom_version:
        description: 'Custom version (e.g., 1.2.3) - only used when version_type is custom'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install npm metadata
        run: npm ci --ignore-scripts

      - name: Test
        run: go test ./...

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [ "${{ inputs.version_type }}" = "custom" ]; then
            NEW_VERSION="${{ inputs.custom_version }}"
          else
            CURRENT_VERSION=$(node -p "require('./package.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

            case "${{ inputs.version_type }}" in
              patch)
                PATCH=$((PATCH + 1))
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
            esac

            NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          fi

          PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"

      - name: Update package version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PREVIOUS_TAG="${{ steps.version.outputs.previous_tag }}"
          RANGE=""
          if [ -n "$PREVIOUS_TAG" ]; then
            RANGE="$PREVIOUS_TAG..HEAD"
          fi

          {
            echo "## [$VERSION] - $(date -u +%Y-%m-%d)"
            echo
            if [ -n "$RANGE" ]; then
              git log "$RANGE" --pretty=format:"- %s" --no-merges
            else
              git log --pretty=format:"- %s" --no-merges
            fi
          } > /tmp/conqr-release-notes.md

          if [ "$(wc -l < /tmp/conqr-release-notes.md)" -le 2 ]; then
            echo "- Maintenance release." >> /tmp/conqr-release-notes.md
          fi
          echo >> /tmp/conqr-release-notes.md

          if [ -f CHANGELOG.md ]; then
            {
              head -n 1 CHANGELOG.md
              echo
              cat /tmp/conqr-release-notes.md
              tail -n +2 CHANGELOG.md
            } > /tmp/CHANGELOG.md
          else
            {
              echo "# Changelog"
              echo
              cat /tmp/conqr-release-notes.md
            } > /tmp/CHANGELOG.md
          fi
          mv /tmp/CHANGELOG.md CHANGELOG.md

          {
            echo "notes<<EOF"
            cat /tmp/conqr-release-notes.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        shell: bash
        run: |
          mkdir -p dist release
          for target in darwin/amd64/darwin darwin/arm64/darwin linux/amd64/linux linux/arm64/linux windows/amd64/win32 windows/arm64/win32; do
            IFS='/' read -r GOOS GOARCH NPM_PLATFORM <<< "$target"
            EXT=""
            if [ "$GOOS" = "windows" ]; then
              EXT=".exe"
            fi
            RAW="conqr-${NPM_PLATFORM}-${GOARCH}${EXT}"
            ARCHIVE="conqr-${GOOS}-${GOARCH}"
            GOOS="$GOOS" GOARCH="$GOARCH" go build -ldflags="-s -w" -o "dist/$RAW" .
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip "../release/$ARCHIVE.zip" "$RAW")
            else
              tar -czf "release/$ARCHIVE.tar.gz" -C dist "$RAW"
            fi
          done

      - name: Pack npm package
        run: npm pack

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit version and changelog
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore: release v${{ steps.version.outputs.version }}"

      - name: Create release tag
        run: git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"

      - name: Push changes and tag
        run: |
          BRANCH=$(git rev-parse --abbrev-ref HEAD)
          git push origin "$BRANCH"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Publish to npm
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: ${{ steps.changelog.outputs.notes }}
          files: release/*
          draft: false
          prerelease: false
